<!doctype html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redefinir Senha - Portal Juninhos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&display=swap"
        rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles/main.css" />
</head>
<body>
    <header class="main-header">
        <div class="header-content container">
            <div class="logo">
                <img src="assets/images/logo-grande.png" alt="Juninhos" />
            </div>

            <button
                id="btn-mobile-menu"
                class="mobile-menu-toggle"
                aria-label="Abrir Menu"
            >
                <span class="hamburger"></span>
            </button>

            <nav aria-label="Navegação principal">
                <ul class="nav-menu" id="nav-menu">
                    <li><a href="#about">Sobre</a></li>
                    <li><a href="#ecosystem">Ecossistema</a></li>
                    <li><a href="#projects">Projetos</a></li>
                    <li><a href="#corporate">Empresas</a></li>
                    <li><a href="#community">Redes Sociais</a></li>
                    <li>
                        <button class="btn-open-modal nav-cta">
                            Entrar na Lista
                        </button>
                    </li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section id="password-reset" class="reset-section container mt-2">
            <div id="reset-feedback" class="form-feedback hidden">
                <p id="msg"></p>
            </div>

            <div class="static-card" style="max-width: 500px; margin: 0 auto;">
                <h2 class="section-title text-center" style="margin-bottom: 1.5rem; font-size: 2rem;">Criar Nova Senha</h2>
                <p class="text-center" style="color: var(--clr-text-muted); margin-bottom: 2rem;">Digite a sua nova senha abaixo</p>

                <form id="password-reset-form">
                <div class="form-group">
                    <label for="new-Password">Nova Senha</label>
                    <input
                        type="password"
                        id="new-password"
                        required
                        placeholder="Digite a nova senha"
                    />
                </div>

                <div class="form-group">
                    <label for="confirm-password"> Confirmar Nova Senha </label>
                    <input
                        type="password"
                        id="confirm-password"
                        required
                        placeholder="Confirme a nova senha"
                    />
                </div>

                <button type="submit" class="btn-submit" style="width: 100%;">
                    Salvar Nova Senha
                </button>
            </form>

            <div class="links text-center" style="margin-top: 1.5rem;">
                <a href="./login.html" style="font-size: 0.9rem; color: var(--clr-text-muted);">Voltar para o Login</a>
            </div>
            <div id="form-feedback" class="form-feedback hidden"></div>
            </div>
        </section>
    </main>
    <script src="./js/resetPassword.js"></script>
</body>
</html>
