<!doctype html>
<head>
    <meta charset="UTF-8" />
    <meta import="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redefinir Senha - Portal Juninhos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&display=swap"
        rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles/main.css" />
</head>
<body>
    <header class="main-header">
        <div class="header-content container">
            <div class="logo">
                <img src="assets/images/logo-grande.png" alt="Juninhos" />
            </div>

            <button
                id="btn-mobile-menu"
                class="mobile-menu-toggle"
                aria-label="Abrir Menu"
            >
                <span class="hamburger"></span>
            </button>

            <nav aria-label="Navegação principal">
                <ul class="nav-menu" id="nav-menu">
                    <li><a href="#about">Sobre</a></li>
                    <li><a href="#ecosystem">Ecossistema</a></li>
                    <li><a href="#projects">Projetos</a></li>
                    <li><a href="#corporate">Empresas</a></li>
                    <li><a href="#community">Redes Sociais</a></li>
                    <li>
                        <button class="btn-open-modal nav-cta">
                            Entrar na Lista
                        </button>
                    </li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section id="password-reset" class="reset-section container">
            <h2 class="section-title">Criar Nova Senha</h2>
            <p>Digite a sua nova senha abaixo</p>

            <form id="password-reset-form">
                <div class="form-group">
                    <label for="new-Password">Nova Senha</label>
                    <input
                        type="password"
                        id="new-Password"
                        required
                        placeholder="Digite a nova senha"
                    />
                </div>

                <div class="form-group">
                    <label for="confirm-password"> Confirmar Nova Senha </label>
                    <input
                        type="password"
                        id="confirm-password"
                        require
                        placeholder="Confirme a nova senha"
                    />
                </div>

                <button type="submit" class="btn-submit">
                    Salvar Nova Senha
                </button>
            </form>

            <div class="links">
                <a href="./login.html">Voltar para o Login</a>
            </div>
            <div id="form-feedback" class="form-feedback hidden"></div>
            <script src="resetPassword.js"></script>
        </section>
    </main>
</body>
